{{- if .Values.global.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "freqtrade.serviceAccountName" . }}
  labels:
    {{- include "freqtrade.commonLabels" (dict "root" . "instance" (dict "_component" "chart" "_name" "shared")) | nindent 4 }}
  {{- with .Values.global.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.global.serviceAccount.automountToken }}
{{- end }}
